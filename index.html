<!doctype html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <script>
      window.__APP_ERROR__ = null;
      function showAppError(msg) {
        setTimeout(function() {
          var root = document.getElementById('root');
          if (!root || root.innerHTML.indexOf('Erro ao carregar') >= 0) return;
          if (!msg || msg === 'Erro desconhecido') return;
          if (root.innerHTML.indexOf('Entrar') >= 0 || root.innerHTML.indexOf('3Maps') >= 0) return;
          root.innerHTML = '<div style="padding:24px;font-family:system-ui,sans-serif;max-width:600px;margin:40px auto"><h1 style="color:#b91c1c">Erro ao carregar</h1><pre style="background:#fef2f2;padding:16px;border-radius:8px;overflow:auto;font-size:13px;white-space:pre-wrap">' + String(msg).replace(/</g,'&lt;') + '</pre><button onclick="location.reload()" style="margin-top:16px;padding:8px 16px;cursor:pointer">Recarregar</button></div>';
        }, 100);
      }
      window.addEventListener('error', function(e) {
        var msg = (e.error && e.error.message) || e.message || '';
        if (typeof msg !== 'string') msg = '';
        // ResizeObserver loop: aviso benigno do navegador, não quebra a app
        if (/ResizeObserver/i.test(msg)) {
          e.stopImmediatePropagation();
          e.preventDefault();
          return true;
        }
        // removeChild: causado por tradutor do navegador (Chrome/Edge) ao modificar DOM de portais Radix
        if (/removeChild|not a child of this node/i.test(msg)) {
          e.stopImmediatePropagation();
          e.preventDefault();
          return true;
        }
        window.__APP_ERROR__ = e.error || e.message;
        var displayMsg = msg || (e.filename ? 'Falha ao carregar: ' + e.filename : 'Erro desconhecido');
        showAppError(displayMsg);
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        var msg = e.reason && (e.reason.message || String(e.reason)) || '';
        if (/removeChild|not a child of this node/i.test(msg)) {
          e.preventDefault();
          return;
        }
        window.__APP_ERROR__ = e.reason;
        showAppError(msg || 'Promise rejeitada');
      });
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3Maps</title>
  </head>
  <body>
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif;color:#64748b">
        <div style="text-align:center">
          <div style="width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px"></div>
          <span>Carregando 3Maps…</span>
        </div>
      </div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
